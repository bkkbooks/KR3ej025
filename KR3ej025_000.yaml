滯不化初起為積積久成疳遂致五臟受病形狀難看初起體實以集聖五疳丸為主覆載五臟病狀察其虛實陰陽各自加減體虛者總以參苓白朮散或肥兒丸調之以補為消可也小兒咬牙舌紅舌上生瘡愛飲涼水唇紅面白喜伏於地此心疳也集聖寧心丸蘆薈靈脂夜明砂使君子各二錢當歸洋參各四錢黃連乾蟾蜍各一錢生地茯苓各二錢膽星硃砂甘草各七分共為末煉蜜為丸如龍眼大每服二丸開水化服末藥沖服亦可小兒面青目生白膜泄瀉青糞此肝疳也集聖平肝丸蘆薈靈脂夜明砂使君子各二錢當歸川芎黨參各四錢黃連蟾蜍膽草梔子防風天麻蟬蛻去頭足青黛各一錢和丸如前小兒鼻下赤爛手足枯細口中腥臭或作喘嗽此肺疳也集聖清肺丸蘆薈靈砂夜明砂廣皮使君子各二錢當歸沙參各四錢黃連蟾蜍桑皮桔梗蘇葉阿膠各二錢炙草一錢和丸如前鼻爛用澤蘭掃粉銅緑等分細末調豬油擦之小兒耳內生瘡腳如鶴膝或齒縫臭爛變成走馬疳者服集聖補腎丸蘆薈夜明砂使君子當歸條參各四錢黃連蟾蜍各一錢熟地五錢茯苓棗仁各二錢粉丹澤瀉各一錢和丸如前小兒愛食泥土冷物飲食無度身面俱黃頭大項小腹脹腳弱間或泄瀉晝涼夜熱不思乳食此脾疳也服集聖醒脾丸蘆薈酒蒸靈脂炒夜明砂炒廣皮各二錢青皮莪朮各一錢使君肉二錢木香八分當歸川芎條參各四錢黃連西砂各一錢上為細末用公豬膽一個取汁將藥和勻粟米糊丸如龍眼大每服二丸米飲調服以下之證以為為主食積久而成疳其症形瘦腹緊時發潮熱羞見生人則哭本方去蘆薈靈脂加黨參黃耆焦朮茯苓法夏枳實紫朴炙草神麯麥芽鱉甲三稜各二錢久瀉不止胃虛成疳此疳瀉也本方去蘆薈莪朮靈脂加白朮茯苓肉蔻去油訶子條參各二錢久痢不止胃虛成疳此疳痢也本方去蘆薈莪朮青皮靈脂加訶子肉蔻建蓮肉各三錢合為丸瘧久不止胃虛成疳此必有癖謂之疳瘧本方去蘆薈靈脂加箭耆炙鱉甲柴胡半夏神麯三稜各一錢黨參五錢和為丸余則腦疳脊疳蛔疳下奚疳無辜疳無外照經虛實寒熱用藥加減諒其小兒元氣厚薄用之可也此證悉載幼幼集成參苓白朮散見泄瀉門肥兒丸治一切久病成疳總歸虛處不可以前法治之只宜以此久服以補為消無不愈者條參箭耆焦術茯苓廣皮當歸各一兩青皮炙鱉甲川連木香使君肉蟾蜍炙草各五分上為細末以山藥四兩打糊為丸量小兒大小加減日日服之米飲送下病愈藥止一方小兒疳積面黃飲水久而不愈可用雞內金二張蝸牛五個焙乾細末以豬臁貼破開將末藥侻上菜葉包好火煨熟與爾子食之自愈依法制食真有神效癇症門小兒癇症多火痰如脈滑沫出痰也脈散腮紅火熱肝經其症之發不一或眼目直斜口噤流涎或手足抽掣腰曲脊強或形如死狀或一二時方醒宜服導痰湯此方治五癇初起輕者服之即安雄黃貝母廣皮茯苓桔梗北細辛菖蒲栝樓薄荷蟲蛻去足天麻鬱金甘草各三分竹瀝薑汁為引小兒忽然昏迷抽掣有力為實邪肝癇是也宜服柴胡清肝散柴胡黃芩梔仁白芍川芎連翹桔梗各六分大便不通加熟軍膽草各五分水煎服小兒忽然昏迷目赤吐舌飲水為心癇是也宜服硃砂安神丸黃連三分當歸生地甘草各一錢硃砂三分共為末米糊丸硃砂為衣小兒昏迷目直髮熱面色光潤脾癇是也宜服導痰湯方見本門前加紫蘇香附蒼朮小兒忽然昏迷面白色手足微動肺癇是也宜服五味異功散人參焦術茯苓甘草等分水煎服一小兒忽然昏迷肢體如尸口吐白沫腎癇是也宜用六味地黃湯見咳血門小兒忽然卒死多屬痰迷以白礬百草霜等分開水沖合灌之必蘇五癇外治法耳後高骨間有紫青筋用針挑破即醒一方用竹瀝薑汁灌之一方細辛牙皂巴豆為末少許微吹鼻中即醒一方用蒜搗汁以茶匙挑入鼻中三次即效煩渴門小兒煩渴有虛有實逐一審視看的方可用藥唇舌乾燥用生地木通竹葉知母各八分水煎服唇舌黑色用熟石膏淡竹葉麥冬連翹各八分灶心土引口渴小便閉澀用豬苓赤苓澤瀉乾葛花粉各八分水煎服夜間渴甚小便不已用生地澤瀉茯苓山藥棗皮麥冬各八分五味子二分水煎服服清火藥煩渴仍不止當用乾薑一錢白芍一錢黨參二錢甘草五分附子一錢烏梅二枚水煎服小兒體虛口渴諸藥不效余用洋參二錢麥冬三錢去心五味三粒水煎服傷風發熱口渴用炒梔淡豆豉各一錢水煎服余治一小兒夏月泄瀉後煩渴飲茶小便不已用熟地棗皮山藥茯苓陳皮半夏甘草花粉麥冬五味水煎服四劑而愈治小兒夏月泄瀉煩渴用黃連煎湯調六一散服之即安余治一小兒泄瀉神倦口渴用白朮雲苓沙參麥冬甘草水煎服余治小兒泄後渴甚吐蛔用花椒附子條參白朮烏梅水煎服之即止小兒盜汗為陰虛每於睡後滿身有汗宜用四物湯加龍骨牡蠣浮小麥五味之屬以養其陰余之意善補陰者於陽中求陰加箭耆棗仁桑葉為妙小兒無端自汗為陽虛宜用四君子湯加五味牡蠣以養其陰或用玉屏風散生箭耆二錢防風八分一方五倍子一錢枯礬五分為末摻小兒肚臍上以能收汗一方生地浮麥各二錢水煎服腹脹門凡氣脹水脹用公雞屎幹一升炒焦黃色退去火毒為末以水三升煎沸用布濾過每服一杯調木香檳榔細末五分此治中滿蠱毒真奇方也治食脹氣脹用萊蔔子一兩細末開水調濾汁將汁水浸砂仁一兩浸一宿將砂仁炒乾又浸共浸七次將砂仁為末每服一錢米湯調下脾虛門凡小兒脾虛飲食減少面黃肌瘦易致傷食腹脹泄瀉等症枳朮丸治小兒並無外感風熱脾虛能補有積能消久服飲食自健外患不生百病皆除焦術四兩枳殼一兩蜂蜜五兩上為細末煉蜂蜜搗和為丸如梧子大每日米飲化開服之凡小兒脾胃不強飲食減少中氣虛弱面黃肌瘦有白蟲者或易傷食並無外症余常用八仙糕治之條參茯苓建蓮去心芡實苡仁扁豆炒棐子去殼穀芽各一兩同炒黃共為末加白糖半斤每服開水調下二錢一方參苓白朮散見泄瀉門有蟲積者加使君肉鶴蝨蟲重者加蕪荑雷丸食積者加焦楂炒黃雞內金重者加谷蟲枳殼諒小兒氣體虛實加之血虛加熟地黃當歸此加入八仙糕亦可千金肥兒餅嬰兒常缺乳飲食不消停脾胃一傷損吐瀉兩相併痰嗽加吭喘熱積致疳驚面黃肌瘦削腹脹肚青筋赤子焦啼哭慈母苦傷情吾心懷幼切家蓮子茯苓芡實懷山藥扁豆薏苡仁以上各四兩神麯麥芽陳條參使君子山楂炙草存六味各二兩古糯米二升藥米均為末布裹甑內蒸白糖一斤半調和餅即成每食二三餅諸病即安寧肥兒王道藥價可擬千金幼科預宜修制應用諸方消風丸凡疏通腠理清解表邪啓發皮毛流利經絡病之初起用之蘇荷羌活獨活防風天麻荊芥川芎南星細辛各等分上為細末煉蜜為丸重一錢一顆每服一丸薄荷湯化開服熱重竹葉湯化服水疊成丸尤良金粟丹凡開關通竅下氣利痰醒昏定痙一切危急者用之九制膽南星二兩天麻一兩白附一兩全蠍一兩去頭足酒炙曬乾乳香一兩赭石一兩火煅醋淬七次僵蟲一兩赤金箔五十張麝香二分桃花片三分上為末煉蜜為丸如皂子大金箔為衣每服一丸薑湯化開服之此方比抱龍金液保命至寶定命等方功強十倍惟有虛寒之痰無根之氣絶脫之症切不可用沆瀣丹治小兒一切胎熱胎黃面赤目閉鵝口瘡重舌喉閉乳蛾渾身壯熱小便赤大便閉結麻疹癍瘰遊風癬疥流丹癮疹痰食風熱痄腮面腫十種火丹諸般風搐及大人頭面三焦風熱等症川芎酒炒黃柏酒炒黃芩酒炒大黃酒炒各九錢牽牛蘇荷滑石連翹檳榔荊芥赤芍枳殼各六錢上為末煉蜜為丸如芡實大小兒服一二丸茶湯送下乳母忌膩煎炒熱物大人一切風熱可服三五十丸惟有虛寒面赤唇白水瀉陰症畏寒喜熱物者切勿服此三仙丹治小兒縱口食物過多有形之物填塞腸胃不能轉運傳達脾氣抑鬱所以發熱不退眼閉難開人事昏沉四肢癱軟儼若虛極之象古人謂大實如羸狀即此是也昧者以為虛證而峻補之或疑為驚風而鎮墜之百無一救速以此丸同沆瀣丹同服待其下後人事即清余救治既多剖心以苦如痢疾誤用澀藥閉其濕熱比食物有形之塞始有甚焉速宜下之不下必死五靈脂二兩廣木香五錢巴豆仁四十粒將嫩皮紙包巴豆仁水濕入慢火中煨熟取另以綿紙包之緩緩捶之去油其紙濕另換以成白霜為度一法研細置新瓦曬之換瓦三次其油亦淨將前藥同研細末醋麵糊丸如緑豆大以硃砂為衣每服五七九丸量小兒加減合沆瀣丹一二丸同研茶清調下待其下後病愈此起死回生之藥勿以常方視之無積氣虛者切勿服之瀉青丸凡退熱平肝清表裡定痙搐解煩躁熱表裡兩急者用方見驚風門理中丸凡脾虛中寒面青腹痛寒嘔寒瀉四肢厥冷一切裡寒者用方見傷暑門加增分兩炒研煉蜜為丸逐寒蕩驚湯凡小兒慢驚腹痛厥冷嘔吐一切裡寒皆可用惟火證唇紅舌燥喜飲冷水者切勿服此方見驚風門寸金丹治小兒食滯感冒無不應驗價廉而功大也方見傷食門外用鉤藤一兩蘇荷一兩煎濃去渣作酒水丸重五分薑湯下神應丸治小兒脾虛嘔瀉等症藿香砂仁炒茯苓赤苓炙草粉草各一兩上為細末老米糊為丸和中丸治小兒脾虛吐瀉傷食腹痛痰嗽等症焦術二兩扁豆炒茯苓砂仁半夏各一兩枳殼神麯麥芽炒香附條參廣皮蟲谷各一兩二錢上為細末每服二三錢以上十方皆立預為修制以便備用頭部門清熱散治小兒一切熱瘡如神雞蛋五個取黃用亂髮如蛋大一團和銅銚中熬之少頃液出如油側出又熬取盡為度候冷以苦參細末調油搽之三妙散治小兒頭面瘡禿松香枯礬各三錢黃丹一錢為末調麻油搽之三黃散治小兒頭面一切熱瘡肥瘡並耳根濕爛黃芩黃柏黃連掃粉各一錢上為細末調淡豬油搽之頭上白禿用白頭翁為末調陳蠟油搽頂先剃頭以川椒白礬煎水洗淨一方用大碗一個以好構紙封於碗口上貼緊上磊穀粳殼於紙上加小炭火於粳上扇燃諒將近紙即將粳殼去之取紙碗中之液如清油者搽之即效天疱濕瘡用天苞葉搗水搽之即好一方柿油搽之並搽蛇串瘡一方用土子末細茶搽之頭上瘡癤初起用鐵燈臺一名金線重摟又曰七葉一枝花用醋磨搽之頭瘡朽爛方海螵蛸胡椒掃粉細末搽之鼻疳小兒鼻疳蝕爛用膽礬燒候煙盡研末摻之一方芝麻搗爛敷之鼻中生瘡方玄參研末塗之或以水浸軟塞入鼻內鼻流清涕或黃水點滴不已方用白芷八錢蒼耳炒辛荑各三錢蘇荷二錢上為細末每服一錢淡蔥湯或絲瓜藤煎水調服小兒鼻血不止方一方用小兒胎髮燒灰吹之一方舊氈帽燒灰吹之一方白及搗爛水調敷鼻梁上煎湯亦可一方生地山梔仁水煎服一方大蒜搗如泥左鼻出血塗右足心右鼻出血塗左足心兩鼻皆出塗於兩足即止一方左鼻流血將右手中指用麻線扎緊或手緊捻中指片時右鼻流血左手一然即效火眼初起用黃連蒸人乳點之內服羌活西風荊芥蟬衣黃芩生地白芍木賊蒺藜甘草各一錢車前草引小兒雀目石決明炒夜明砂各一錢豬肝二兩蒸湯服小兒眼腫紅爛烏梅一粒古錢八文五倍子二錢皮硝一錢蟬衣二錢苦參一錢煎水洗內服蘇荷赤芍熟軍白菊桑皮桔梗黃芩甘草各一錢水煎服小兒耳痛一方黃柏浸水滴入耳內一方鬱金浸水滴之一方蛇蛻燒灰吹之一方虎耳草加鹽少許搗汁滴之一方芭蕉樹用竹筒斜插次早取下筒內之汁滴之耳中出血一方龍骨細末吹之一方胭脂燒灰吹之耳中停膿血海螵蛸枯礬甘草各一錢銀硃三分紅綾三寸燒灰寸香一釐洋片二分胭脂寸大燒存上為末先用白紙條入耳拭淨膿血然後吹之一方什仿煙灰寸香少許吹之耳根紅腫南星花粉白芷赤芍薑黃各一錢青黛牙皂各五分上為末雞蛋調勻敷之一方石灰水調桐油各半敷之繡耳瘡掃粉海螵蛸黃丹各一錢洋片三分上為細末麻油調之口生熱瘡洋參一錢硼砂七分秋石五分為細末吹之一方新鮮鵝屎布包濾水搽之一方陀僧為末調醋搽足心內亦效牙疳枯礬五分冰片二分寸香五釐研末抹患處三次即愈六仙散治小兒大人走馬牙疳青黛黃柏蘇荷各五分人中白兒茶各一錢洋片一分上研細末先用青布洗去白膜方用蘆管吹於患處立效牙床腫痛花粉石膏生地連翹蘇荷甘草黃芩西風各一錢水煎服牙痛生地石膏防風丹皮蒺藜荊芥各二錢水煎服舌痛茯苓麥冬去心連翹梔子黃芩澤瀉甘草各一錢水煎服喉痛桔梗甘草玄參牛膝西風僵蟲水煎服喉生雙蛾牛黃一釐寸香一釐熊膽一釐枯礬三釐細末吹之一方土牛膝煎水服之一方白礬皂角刺燒灰細末吹之一方鵝之喉管燒灰吹之一方人之指甲刮灰吹之破即愈一方青魚膽緑豆粉浸干加洋片細末吹之一方燕窩土雄黃另研雞拍翅鳳尾草各等分共搗爛酒醋調敷於喉外兩旁其效如神咽喉腫痛射干根山豆根細末吹之天蛇頭生指頭上起一白泡或生指甲旁俗名指邊風痛不可忍速用明雄一錢細末入豬苦膽中套入指上絲線扎緊一方蟾酥五分寸香五分明雄一錢熊膽二分共為細末調蛋清敷之心胃門胃氣疼痛香附良薑各二錢水煎服必效散治心胃腫痛靈脂延胡索枳殼廣皮各一錢丁香檀香各五分共為細末每服五分心腹氣痛荔枝炒木香各七錢不過火為細末每服七分腫症門小兒腫症多屬風腫食腫者體實得汗自解食腫者消之即愈致於虛腫者補之水腫者消之諸方開於下用者諒小兒虛實加減用之可也看腫症法上腫下消皮膚麻閉當發汗宜越婢湯腫症以手指掐起遲者水腫也當服五皮飲體虛二便皆清者宜服金匱腎氣湯腫症以手指掐隨手起者宜服木香流氣飲腫症下腫上消乃元氣下陷當升提宜服補中益氣湯因食積腫痛宜消導當服香平散越婢湯治風腫感冒初起體實者得汗自愈麻黃去節一錢石膏三錢甘草五分生薑汁引如面白浮腫小便利者加白朮三錢五皮飲薑皮苓皮桑皮大腹皮五加皮水煎服香平散香附炒為末牽牛炒為末三稜蒼朮陳皮厚朴甘草各等分水煎服耆芍桂枝湯治發熱汗出四肢浮腫桂枝白芍各三錢黃耆蜜炙五分水煎服防己茯苓湯治身腫水氣在皮膚防己蜜耆肉桂各一錢赤苓三錢甘草一錢共為末每服三錢補中益氣湯治體虛冒風發腫升清降濁黃耆當歸各二錢陳皮升麻各八分人參二錢柴胡蜜炙一錢甘草桂枝各八分防風木通木瓜各一錢薑皮引金匱腎氣丸治腎腫症熟地二兩白苓一兩五錢牛膝肉桂澤瀉車前棗皮懷山藥丹皮各五錢附子三錢煉蜜為丸一方葫蘆牽牛煎水服一方土狗焙乾為末沖酒服一方鯉魚入蒜滿腹煮服大小便齊通後用健脾丸服之膀胱門小兒膀胱氣痛腎墜看外腎之堅軟堅結氣痛者破之腎之鬆散下墜者補之小便清得熱手按之便減者溫之即愈方用鹽青果一個燒灰存性褐子毛即羽毛嗶嘰方寸燒過細開水兌酒服一方舊酒葫蘆煎水服即收馬藺散治小兒疝氣偏墜堅硬痛極馬蘭花橘核各二錢青鹽五分莪朮川楝子青皮枳殼各一錢木香粉甘草各八分荔枝核五個燒八角茴五分引補中益氣湯治腎氣虛墜方見咳嗽門溫疝丸治疝氣寒痛偏墜等症故紙胡蘆巴橘核炒小茴安桂延胡索炒各一錢上為末煉蜜為丸每服二錢開水下小便門小兒小便不利皆因肝經有熱則小便赤甚腫痛宜用八正散治膀胱有熱小便不通車前子熟軍瞿麥萹蓄木通梔子甘草滑石各一錢水煎服若小便腫者用蚯蚓泥塗之即消輕者用馬鞭梢車前草等分煎水服一方石葦水燈芯煎水服如服寒涼藥不應者用補氣藥陰不足者用補陰滋水藥即效淋症門有火淋濕淋虛淋之別火淋者宜服五苓散膀胱有熱小便不通淋瀝不出作痛尿血皆治赤苓生地澤瀉條芩甘草當歸木通赤芍前仁滑石山梔各一錢水煎服如痛甚者加大黃海金砂一方蚯蚓泥滑石甘草泡水澄清飲之胃苓丸治小兒小便初出黃色少頃變為米泔汁者謂之尿白傷脾所致久則成疳蒼朮厚朴廣皮白朮雲苓豬苓澤瀉甘草各一錢炙上青桂五分水煎服二術通淋飲治小兒濕淋脾虛受濕小便如米汁者焦術蒼朮雲苓澤瀉黃芩連翹木通甘草各一錢車前草為引煎服固腎保平煎治虛淋芡實三錢牡蠣煅龍骨煅蒲草根各一錢上水煎去渣用豬腰子一個切片將藥水煮熟服之小便血用雞屎尖白如粉者炒焦為末酒調空心服下五分尿血烏梅燒灰存性為末米泔調下一錢大便門小兒大便不利多由飲食熱物風熱結於便以保和丸加枳殼大黃微利之若是血虛平素難便者宜服潤腸丸保和丸治飲食停滯胸膈痞悶腹脹等症神麯廣皮法夏雲苓山楂連翹萊蔔子為末煉蜜為丸潤腸丸治老人虛人小兒男婦人大便閉結火麻仁八錢杏仁郁李仁各四錢當歸一兩枳殼金井膠家蘇子萊蔔子各三錢上為末煉蜜為丸每一二錢量人加減白湯送下脫肛門難經云出者為虛肛門之脫非虛如何況大腸與肺為表裡肺臟蘊熱則閉虛則脫須用補中益氣湯為主升舉與補之不可用墜氣之藥補中益氣湯方見咳嗽門脫肛不紅不痛是氣血兩虛本方加粟殼伏龍肝各一錢脫肛赤腫有痛宜涼血去風本方加羌活防風白芍脫肛裡急後重有膿血者本方加木香烏梅脫肛大腸熱甚肛門赤痛宜服升麻湯升麻白芍甘草羌活黃芩黃連西風肛門作癢腹中有蟲內服花椒烏梅使君子檳榔等藥蔥白為引外朴硝煎湯洗之脫肛以鱉頭燒灰研細以麻油調勻塗之外用尿泡桐葉托進小兒脫肛用陳壁土地瓜根煎水溫洗用菜葉抬手托進帕子兜起大裹腳從屁凹勒住負於大人背上外用萆麻葉搗爛包小兒囟門一時即收內服黃芩連翹升麻西風桔梗甘草各一錢車前為引大便糞前見血者為近血蓋自大便出也宜服黃連解毒湯黃連五分黃柏條芩梔仁各一錢燈芯為引水煎熱服糞後見血者為遠血從胃脘小腸出也清胃湯止之久不止者補中益氣湯加黃連清胃湯黑梔子生地丹皮當歸各一錢川連五分水煎服補中益氣湯方見咳嗽門瀉血用亂頭髮雞冠花側柏葉俱燒灰存性為末酒沖服一錢又方霜後乾絲瓜燒灰為末空心酒服一錢足腫門小兒足腫用手按之成坑遲起者水腫也隨按隨起者氣腫也形色虛弱關紋青淡眼光散大者主腎虛方各方附下治水腫方防己黃耆赤苓丑牛各一錢肉桂五分甘草七分水煎服氣腫方防己箭耆升麻當歸焦術炙草各一錢水煎服治腎虛腫方熟地五錢澤瀉雲苓棗皮懷山藥各二錢牛膝附片各一錢甘草八分水煎服治鶴膝風方虎脛骨石欄藤箭桿風當歸防己酒煎服足上濕氣石菖蒲箭桿風薑蔥共搗如泥敷上即效足上凍疱洗方用桐子葉或茄子根煎水洗之足上濕爛方用水龍骨煅為末摻之即舊船底下練子灰足上繡爛枯礬甘石掃粉胡粉細末摻之救急門燙火傷者切勿以冷水洗之恐熱氣入心外沾生水亦易潰爛倉忙無藥即用鹽醬摻之一方煤炭細末調油搽之一方石灰澄水調桐油搽之一方絲瓜皮焙乾為末調油搽之一方夏枯草焙乾為末調油搽之一方七里香葉曬乾研細末調油搽之一方桐子花焙乾為末調油搽之一方鱉甲燒過存性細末加洋片寸香研細調麻油搽之一方冬日收爛橘柑或老黃瓜用罐盛之自化成水搽之皆有奇效傷重者恐火毒攻心內服方箭耆當歸各三錢西風雲苓荊芥黃芩澤瀉大黃甘草各二錢水煎服刀傷出血用鍋煙墨搽之一方用生薑嚼爛敷之一方破氈帽燒灰摻之一方白蜘蛛網纏之一方古石灰同韭菜搗成餅陰乾刮下摻之跌傷未出血者用手揉散瘀血外用七里香葉嚼爛敷之一方澤蘭葉貼之跌傷已出血者用刀傷藥摻之甚重用紅花大黃血竭細末摻之久潰則用玉紅膏貼之瘋犬撕衣中毒一方紅豆子根皮為末米汁調下五分一方牛蒡子根一兩煎水去渣煮米粥一碗服之即效一方黃瓜草此草生在岩下陰濕處如嫩蘿蔔葉揉爛有黃瓜氣即是用十餘兜搗爛沖米汁服之一方韭菜搗汁每服一酒杯七日一次服七次即效一方虎頭骨細末調麻油服之皆有神效
