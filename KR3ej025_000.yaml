body:
  text: 小兒要略論古人云寧治十男子莫治一婦人寧治十婦人莫治一小兒此言小兒號曰啞科治之甚難景嶽先生又謂其甚易何以見之蓋小兒之病無脈可診血氣未充故也病之痛癢又不能以言傳惟有望聞切而已難乎不言而獨言其易者抑亦以小兒之病不過外感風寒內傷飲食驚風吐瀉之類並無七情六郁色欲憂思之患故豫治小兒表病不過香蘇散惺惺散之類治小兒里病不過平胃散藿香散之類治小兒虛痰諸症不過二陳湯六君子湯之類治小兒實熱諸症不過小兒牛黃丸瀉青丸之類凡此表裡虛實之病解表攻裡只宜輕劑毋容大表大下以傷元氣至於驚風吐瀉各種雜症則分入門別例而治之矣看小兒病狀歌內附望聞問切小兒有病令人憐全仗醫生仔細觀令人抱出光明處先將面部用心看額屬心兮鼻屬脾左肝右肺兩腮前頦乃腎經為主宰五經辨色要心虔白有氣虛黃有積赤者為熱青主寒鼻塞聲重傷風重眼下青色主飲痰口唇赤白辨陰陽赤者胃熱白者寒蟲積唇內生白點疳氣鼻燥體態干有痛啼哭總不止有積襁褓不耐煩抱出探涼欲赴冷此是內熱使之然若是當風急畏縮必是傷風與陰寒鼻冷瘡疹耳冷熱遍身發熱是風寒手足心熱口發渴紋沉食積是真詮若是下午手心熱陰虛盜汗夜生煩倘若手指梢頭冷便是驚風一例看只有中間一指熱小兒亦定是傷寒中指微微獨自冷定然麻痘恐相纏復看指紋記歌訣浮沉色氣審的端要看指紋風氣命三關內推細心研三關部位寅卯辰病之吉凶在此間初起風關病無礙氣關紋現恐纏綿乍臨命位誠危急射中通關命難全指紋何故浮然樣邪在皮膚病易蠲腠理不通名表證急行疏解汗之先忽爾關紋沉沉狀已知入里病盤旋莫將風藥輕相試須向陽明裡證宣身安定見紅黃色紅豔本來是傷寒淡紅隱隱虛傷寒定將深紅作熱看關紋見紫熱之兆青色為風是的端傷食紫青痰氣送三關青黑恐難安指紋淡淡不必悅氣質薄弱稟先天脾胃本虛中氣微切防攻伐損嬰元關紋滯澀本因積邪遏陰營衛氣連食鬱中焦風熱熾不行推蕩病何遷腹痛紋入掌中里彎內自然是風寒紋向外彎痰食熱水形脾胃兩傷焉復診掌後關中脈浮沉遲數審的端七至八至為數熱四至五至為遲寒浮脈主表病在外沉脈至里病內潛數脈六至腑有熱遲脈三至主臟寒浮而有力風與熱無力中虛宜培元沉而有力痰積食沉而無力氣滯間遲而有力乃為痛遲而無力是虛寒數而有力本實熱無力瘡瘍恐熬煎此是切脈真口訣靜心審的要心專再看舌苔分表裡紅黃有火清即安白滑裡寒溫中急白澀裡熱黃滑寒若是舌黑辨陰陽氣息冷熱用手探口中氣熱小便赤舌黑必燥下為先氣微便清手足冷參耆桂附妙如仙小兒陰虧舌亦黑滋陰潤燥無不痊又看胸腹堅與軟虛實此中可細參望切之理諒如是聞聲問證豈可偏言厲聲粗知病實氣衰體虛必微言肝病怒聲心病笑脾病發聲如歌然肺病出聲有若哭腎主呻吟恐共間陽證身輕言響亮陰證昏逆閉眼眠陽症發狂喜飲水陰證鄭聲話懶言一問寒熱二問汗三問頭身與胸前四問飲食病新久五問二便與渴煩六問前服藥寒熱七問痘麻與後先用藥細心諒虛實有積體虛兼培元熱清溫濕風疏散久瀉當澀固先天如斯診治細斟酌藥到病除福無邊少者懷之遵聖意惟願赤子壽百年若問是編何人輯亞拙山人在魚泉虎口三關小兒三歲以下有病須看男左女右手虎口三關從第二指側向內推看第一節名風關第二節名氣關第三節名命關辨其紋色紫者屬熱紅者屬寒青者驚風白者疳病黑者中惡黃者脾之困也若現於風關為輕氣關為重過於命關則難治矣古人辨色察見形色先分部位左頰青龍屬肝右頰白虎屬肺天庭高而離陽心火地角低而坎陰腎水鼻在面中脾應唇際紅色見而熱痰壅盛青色露而肝風怔忡如煤之黑為痛中惡逆傳似橘之黃食傷脾虛吐利白乃疳癆紫為熱熾青遮日角難醫黑掩太陽不治年壽赤光多生膿血山根青黑每多災異朱雀貫於雙瞳火入水鄉青龍達於四白肝乘肺位瀉痢而戴陽須防咳嗽而拖藍可忌疼痛萬殷面青而唇口嘬肝風欲發面赤而目直視火光焰焰外感風寒金氣浮浮中藏積滯乍黃乍白疳積連綿又赤又青風邪瘲瘛氣之囟門成坑血衰頭毛作穗肝氣眼生眵淚脾冷流涎滯頤面目虛浮定腹脹而上喘眉毛頻蹙必腹痛而多啼左右兩頰似青黛知為客忤風氣二池如黃土無乃傷脾風門黑主疝青為風方廣光滑吉昏暗危手如數物兮肝風將發面若塗朱兮心火燃眉坐臥愛暖風寒之入伸縮就冷煩躁何疑肚大腳小脾欲困而成疳目瞪口張勢似危而必斃噫五體以頭為尊一面惟神可恃況聲之輕重不同啼之乾溼頓異呵欠連綿知病之欲作忽然驚叫識火之將煒此察證之規繩幸拳拳而不悖看危症法小兒渾身熱似火手足如冰真難過黑掩太陰口角青盧醫一見也須驚黑色如針垂眼下醫如扁鵲也須怕黑色目中總不良小兒十日必然亡水腫之病準頭黑此兒應知腎氣絶咳嗽最忌白入眉肺虛氣絶報君知目暗無光不轉睛三朝必定命難存眼似開而又不開能言也是死之媒嘔吐不止止又吐胃虛脾敗何須顧搖頭咬齒欲齧入看看定是鬼為鄰囟門或腫或深沉元氣虧而命難存蛇蟲吐出腐而敗脾絶小兒終是害五心忽腫為何因假火發外實驚人四肢無事忽搖動醫人到此無藥用此是小兒危急症説與醫人莫須情小兒正面左腮屬肝經其色青者為順白者為逆右腮屬肺經其色白者為順赤者為逆額上屬心經其色赤者為順黑者為逆鼻準屬脾經其色黃者為順青者為逆頦下屬腎經其色黑者為順黃者為逆初生門小兒初生下地不宜久沐浴恐冒風寒必患臍風發熱等症小兒初生勿先服乳用黃連甘草煎湯以軟棉包二指頭上蘸藥水拭口去口中惡血穢氣或以藥湯灌之待惡沫吐盡然後食乳一方陳茶京墨洗口或服萬安湯治小兒下地先服此藥永無驚風少生瘡疾連翹西風荊芥蟬蛻鉤藤各一錢蘇荷赤芍甘草各五分銀花二錢燈芯引或在腹中過夏者加熟軍一錢小兒洗三生子過三日或九日俟天氣溫和冬日必在暖室中燒柴火於室內用苦楝子一兩煎水小兒遍身洗擦不生瘡癢若能每月洗一二次可免痘麻縱出必稀一方蒼耳子煎湯洗之一方烏魚煎湯洗之臍風門小兒臍風腹脹四肢硬直多啼不乳唇青口撮或吐白沫肚生青筋上行分岔細心審詳行至心者不治看青筋盡頭處用燈火散之或以艾火灸臍先用薑切片或蒜切片隔臍上加艾火灸之或元宵燈火散之或看小兒上齶有白泡者用銀針輕輕挑破若出血必愈小兒臍風馬牙奇方枯礬二錢硼砂五分洋片寸香各五釐共為細末凡小兒下地洗過即用此末摻臍眼上換尿布時仍然摻上摻完一料永無臍風等症元宵燈火治小兒臍風撮口風或面青黑角弓反張兩目斜視一切風閉火閉痰閉乍然卒死者急宜以此燈火散之惟久病虛弱形骸消瘦自汗盜汗吐瀉痘麻失血之後精神疲倦者切忌此火攻元宵燈火歌元宵燈火本十五囟門眉心兩合骨臍輪臍心共七焦鞋帶四焦救兒苦又驚風燈火仰向後者燈火焠其囟門兩眉心臍之上下眼翻不下者焠其臍之上下不省人事焠其手足心心之上下手拳不開口往上者焠其頂心兩手心撮口出白沫者焠其口上下手足心出驚風祕訣臍風服藥看小兒口中氣熱唇紅眼生眵結關紋紫青粗浮速用鉤藤蟬蛻天麻僵蟲黃芩西風廣皮連翹甘草各一錢膽星三分車前草引水煎服若是面青唇白手足厥冷口中氣冷牙關緊急眼上視關紋青黑不浮而淡者速用黨參箭耆天麻懷山藥各二錢雄片乾薑法夏廣皮茯苓僵蟲當歸各一錢甘草五分大棗二枚為引驚風門急驚風之症小兒氣體壯實前數日發燒令口鼻中氣熱大便結小便臊驚風大作喉中有熱痰者速服怯風敗毒散羌活防風獨活前胡蟲蛻去足天麻蘇荷荊芥桔梗黃芩各一錢甘草膽星白芥各三分燈芯引大便不通加大黃小便不通加木通痰喘加蘇子萊蔔子抱龍丸治急驚發搐膽南一兩竺黃三錢辰砂飛過一錢五分雄黃一錢五分麝香二分甘草湯為丸蘇荷湯下服後吐痰即愈瀉青丸治急驚木旺生風口眼歪斜並治小兒內熱火瀉若醬色者神效當歸川芎梔仁熟軍羌活防風膽草各等分酒水為丸茶清下煎湯亦可慢驚之症緣小兒吐瀉之後得之者多或久病之後或急驚用藥攻降太甚皆原脾胃虛損其症神昏氣喘或大熱不退或乍寒乍熱或面色淡白青黃二便清白甚至吐瀉四肢厥冷喉內痰鳴角弓反張手足抽掣等狀速服逐寒蕩驚湯治小兒氣體本虛或誤寒涼泄瀉嘔吐轉為慢驚必致手冷唇白便清者最宜並治發痧腹痛等症白胡椒乾薑炒肉桂各一錢丁香十粒上四味共為細末以灶心土煎水澄清煎藥大半茶杯頻灌之服後理中方定獲奇效逐寒蕩驚湯最宜多配真為至寶靈丹丸有危症探小兒口中氣息冷熱小便青黃無論小兒口渴舌燥手探口中氣息微冷便清者速用如神功難盡述余手經驗已治多人惟火極似水者必眼眵乾結小便赤色口渴氣壯身輕目張者切勿服此加味理中地黃湯此方助氣補血卻病回陽專治小兒精神已虧血氣大壞瘦弱至極皆可挽回真有參天回元之功熟地當歸枸杞棗仁箭耆炙焦術黨參炙各二錢棗皮肉桂故紙乾薑炒炙草各一錢生薑三片大棗三枚胡桃一個為引外用灶心土二兩煮水煎藥加雄片五分亦可如咳嗽加百合金櫻子各一錢大熱不退加白芍一錢泄瀉不止加丁香六分景嶽胃關煎治慢驚脾虛泄瀉不止及腹中時有微痛熟地三錢山藥扁豆炒焦術各二錢黑薑吳萸炙草各六分景嶽六味回陽飲治慢驚四肢厥冷黨參附子乾薑各一錢熟地四錢當歸土炒二錢汗多者加箭耆二錢泄瀉者加焦術二錢胎熱門小兒胎熱身上濕爛者用泥蜂土研細摻之一方江西碗泥研摻之一方蕎米粉摻之一方草房上青苔焙乾研細摻之五福化毒丹治胎熱胎毒口瘡等症玄參桔梗各一錢洋參青黛各三分赤芍甘草各四分以上俱為細末再用馬牙硝二分寸香三釐另研和前藥用蜜為丸薄荷煎湯下遊風丹毒小兒初生後身上或起一片或數片或時紅腫或時消散是也急宜速治遲則無救也消毒飲治小兒丹毒牛蒡子炒荊芥西風黃芩各一錢升麻甘草各五分伏龍肝為引小便不利加車前木通大便結加熟軍敷毒丹伏龍肝黃連地榆燕子泥各五錢明雄三錢共細末調冷水敷之變蒸考凡小兒生後必有變蒸之期其發熱吐瀉與病無異若誤認為疾妄投藥餌以致蒸長之氣全消無疾而成有疾誤事不小自生之日起至三十二日一變蒸三百六十零五日滿十變骨節成矣專此之時宜保護之若逢變蒸之期必額多微汗唇生泡耳冷吐乳真可信也宜服惺惺散治小兒變蒸發熱咳嗽痰涎鼻塞身重沙參白朮茯苓甘草白芍花粉桔梗各一錢細辛蘇荷各三分水煎服發熱門小兒發熱非一端或因食積或因寒有實有虛有積熱説與醫人仔細看發熱面紅氣粗口渴啼哭煩躁唇紅小便赤色解表即退宜服黃芩紫蘇蘇荷防風柴胡蟲蛻連翹木通車前荊芥各五分燈芯為引發熱面白眼青氣微神倦溫補即退宜服洋參白朮茯苓半夏蟲蛻骨地廣皮天麻薑炒甘草各五分發熱面赤氣促兩鼻扇動汗多此肺竅不通肺火有餘宜服牛蒡子炒枳殼蘇子北芥萊蔔子鉤藤茯苓蘇荷桔梗云皮廣香蒲黃各一錢北辛牙皂各二分微熱面白氣促兩鼻扇動體虛者宜服黨參二錢雲苓陳皮半夏各一錢肉桂五分炙草黑薑各六分當歸一錢大紅棗二枚為引虛熱日久手足心熱下午益甚時熱時退虛煩口渴宜服生地棗皮懷山藥茯苓當歸地骨皮熟地丹皮澤瀉麥冬去心各一錢北味七粒烏梅紅棗各一枚為引疳積發熱肌瘦大便艱澀汗下不能積熱也宜服鬱金膽星熟軍使君去殼紅曲各二錢共為末紅糖水調服發熱咳嗽鼻塞聲重宜服前胡桑皮蘇荷桔梗乾葛紫蘇知母各一錢北辛三分杏霜去油一錢水煎服久熱面目浮腫鼻流清涕此體虛覆冒風寒宜服黃耆白朮當歸升麻柴胡陳皮黨參桂枝防風各一錢甘草三分薑棗為引發熱鼻中出血宜服桑皮杏仁丹皮白芍骨皮側柏葉炒甘草荊芥各一錢不用引水煎服小兒夜啼用燈花五朵研爛塗娘乳上令小兒食乳自安一方青黛研水服之一方五倍子研末水調填臍上即安感冒門傷寒感冒病尤輕微微發熱自然平一錢紫蘇薑二片豆豉十粒自安寧天保采薇丹勿論大人小兒四時感冒薑湯下或身無汗加蔥白化服二三錢小兒一二錢或七八分如未愈再服即效惟小兒質嫩氣嬌一受外邪風驚癇瘧遂致痰火併泛壅塞肺竅手足抽掣聲音難出先以此方開提肺竅表散外邪利氣疏痰安和脾胃則病已去大半矣羌活獨活前胡赤芍升麻葛根半夏廣皮茯苓紫朴枳殼霍香甘草川芎蒼朮桔梗各等分上為末神麯糊丸傷風門小兒傷風頓覺頭痛鼻塞呵欠喘急身熱脈浮者是也蓋肺主皮毛風入皮毛多為咳嗽其指紋紅紫而長外感候也又有傷風自利腹脹而手足冷者脾怯也當與和脾而兼發散又有潮熱多唾氣粗嘔吐乳食不消大便黃白而嗽者脾肺受寒不能受納而吐也若傷風多淚脅痛目腫而咳者兼肝症也汗多而嗽者心症也面黃唇腫少食噁心兼脾症也面白眼腫上氣喘急為肺虛也嗽而腰痛兼腎症也人參敗毒散治小兒四時感冒傷風咳嗽凡咳嗽痰不應者每二三服不拘劑數以痰豁為度沙參桔梗枳殼川芎甘草茯苓羌活獨活前胡柴胡防風荊芥各一錢生薑一片為引水煎熱服忌油脾怯者倍茯苓加懷山藥扁豆焦朮藿香兼肝症倍柴胡加白芍微加青皮兼心症倍獨活加連翹木通兼脾症加大麴山楂麥芽兼肺症實者倍加枳殼白芥子兼腎症倍加獨活傷寒門小兒傷寒有五法一曰發表其症脈浮發熱身痛惡寒脊項強氣喘咳嗽頭痛四肢拘急口舌和脈不沉口不渴二便如常方用麻黃桂枝青龍之屬一曰解肌脈尺寸俱長目痛鼻乾漱水不欲咽方用葛根湯升麻葛根之屬一曰和解脈不浮不沉往來寒熱嘔吐脅痛胸前脹滿耳聾頭汗盜汗目眩口苦方用大小柴胡之屬一曰攻裡脈至沉而有力潮熱惡熱腹痛下利手足心液有汗出咽乾齒燥目不明譫語發狂小腹滿下利清黃水不得眠小便多自汗外證頭痛發熱俱罷方用白虎小承氣六一順氣之屬一曰救里脈沉無力下利清穀小便清長四肢厥冷嘔吐清水涎沫背惡寒蜷臥多眠囊縮爪甲青吐蛔乾嘔舌卷手足拘急身體痛如被杖方用理中四逆真武白通之屬麻黃湯治太陽經傷營發熱無汗惡寒麻黃體虛少用桂枝杏仁炙草各等分水煎服得汗而解桂枝湯治太陽經風傷衛發熱自汗惡風桂枝一錢五分白芍生薑各二錢紅棗五枚甘草一錢水煎溫服大青龍湯治太陽症見風脈麻黃八分石膏二錢桂枝一錢杏仁七粒炙草五分水煎溫服小青龍湯治表不解心下有水氣乾嘔或咳或噎或喘麻黃桂枝白芍半夏各一錢甘草乾薑北辛各五分五味十二粒水煎涼服葛根湯治陽明胃經目痛鼻乾不眠粉葛二錢赤芍桂枝麻黃炙草各五分蔥白三莖生薑三片紅棗二枚為引水煎服如惡寒倍加麻黃惡風倍加桂枝如陽明腑病不惡寒有汗而溫當白虎湯升麻葛根湯治邪在陽明經無汗惡寒發熱升麻粉葛赤芍炙草等分水煎服小柴胡湯柴胡三錢沙參黃芩法夏炙草各一錢生薑一片紅棗三枚為引水煎服按此經無出入路不可汗下止此方和解之如兼陽明症方加葛根芍藥如尚有惡寒等症用大柴胡湯太陽經表之表也行身之背陽明經表之裡也行身之前少陽經半表半裡也行乎兩脅之傍過此則少陰太陰厥陰俱入臟而為里大柴胡湯治表症未除里症又急汗下兼行柴胡黃芩白芍各一錢法夏八分大黃七分枳實四分生薑三片紅棗三枚水煎服白虎湯治身熱大渴而有汗脈洪大者服此無渴者不宜熟石膏二錢知母二錢甘草一錢粳米一撮水煎服調胃承氣湯治太陽陽明不惡寒反惡熱大便祕結而嘔日晡潮熱大黃二錢芒硝甘草各一錢生薑五片水煎熱服大承氣湯治陽明太陰譫語五六日不大便腹痛煩渴並少陰舌乾口燥日晡發熱脈沉實者大黃三錢紫朴枳實芒硝各二錢生薑五片水煎服小承氣湯治六七日不大便腹脹滿悶症在太陰無表症汗後不惡寒潮熱狂言而喘者大黃三錢紫朴枳殼各二錢水煎服桃仁承氣湯治外症已解大便黑小便利為瘀血症大黃二錢桃仁七粒桂枝芒硝炙草各一錢水煎服凡用三承氣湯須以手按小兒自胸至腹果有硬處手不可近又看其舌之燥滑如何然後分別當急下者宜用大承氣渴可少與者宜小承氣湯宜微和胃氣者宜調胃承氣湯小建中湯治傷寒腹中急痛陰陽相乘桂枝一錢白芍三錢炙草飴糖各一錢生薑三片紅棗三枚水煎服陰症腹痛不大便桂枝芍藥湯腹痛甚桂枝大黃湯腹痛自利小便清白宜四逆湯理中湯黃耆建中湯治傷寒汗後身痛脈遲弱者箭耆蜜三錢白芍二錢安桂炙草各一錢生薑三片紅棗五枚水煎好入飴糖二匙再煎一沸或瀉者飴糖不用汗多耗損陰氣不能榮養筋骨故痛陽虛故脈遲汗後故脈弱此乃建立中氣使生長榮衛通行津液則表不虛而身痛自愈理中湯治太陰病自利不渴寒多腹痛條參焦術各二錢乾薑炙草各一錢水煎溫涼服真武湯