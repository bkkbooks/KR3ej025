front:
  text: 序夫醫者意也謂以己之意迎合伊之病也故善醫者必待望聞問切而後詳理開方此古今一定不易之理也蓋幼稚小兒天真渾噩無識無知肌肉瑩徹脈絡分明其病不過風寒暑濕燥火飲食停聚而已舉目可見豈如壯者之人或因酒色過度或由思慮受傷之紛紜雜沓難為措手哉故觀其面色聞其啼聲即可知其病之所從來與夫藥之所宜用而無毫釐或爽也無如世之庸醫不察夫體屬嬰孩一染微疴並不細心體貼概以驚風險劑投之往往有誤不知實而誤補不過增病虛而誤攻不可救藥故全生者少而垂斃者多矣王君亞拙醫道高明慈愛為懷不殫勞瘁合選古今方而斟之酌之匯為一册適豫過訪蒙以見示見其理精法密指點親切較諸幼科所傳方書倍加詳明透徹亟勸其付諸棗梨以公諸世將見此書一出可以指庸醫之迷延幼稚之命其為益豈淺鮮哉是為敘時道光二十七年歲次丁未桂月朔日江陰廩生杜價祿賓五氏拜序自序鑫曩者從事覺來先生有年倏一日問於先生曰醫書以幼科為啞科謂其有疾不能自言也豈不難乎先生曰夫幼子者精神未受七情六欲之攻臟腑未經八珍五味之漬投之以藥易為見功猶膏粱之變難窮而藜藿之腹易效也有何難哉但今之醫見小兒燒熱未審關紋浮沉悉用表藥以汗之睹稚子號啼不按胸腹強弱盡行消藥以攻之不知胎嬰元氣微薄用藥一誤變證百出矣可不慎乎繼而訓曰凡看小兒先觀元氣厚薄手探口息寒熱次察唇舌潤燥再看關紋色氣問其飲食二便方才酌方調治庶不有誤余體先生之訓不敢自私至於暇日將歷來幼科善本摘其切實認證之法選其當要歷驗之方每證之下專變陰陽諸方之中悉論虛實故顏之曰幼科切要意欲公諸同人使窮鄉僻壤得見是篇見小兒有恙輕者不必求醫病重者不為醫誤能讀而習之終身知醫奈歷年來蝟務鞅掌有志未逮迄丁未余客渝城幸遘傅君怡如艾君頊堂邱君東山並坐談心與言及此遂毅然有倡助之意實先得我心之所同然者遂將諸科亦同付之剞劂不數月書成惟冀四方樂善君子廣為印布於保赤子之意不無小補庶不負覺來先生訓誨之心而諸公公世之忱亦不致湮沒矣是為序時道光二十七年丁未歲桂月朔日魚泉王錫鑫亞拙氏謹識
